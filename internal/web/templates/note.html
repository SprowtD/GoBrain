{{define "note"}}
<div class="note-head">
  <span class="note-path mono">{{.Path}}</span>
  <button class="close" onclick="gbCloseNote()" aria-label="close">×</button>
</div>
{{- if .NotFound}}
<p class="empty">Note not found.</p>
{{- else}}
{{- if .Frontmatter}}
<details class="note-meta">
  <summary class="mono">frontmatter</summary>
  <pre class="note-meta-body mono">{{.Frontmatter}}</pre>
</details>
{{- end}}
<div class="note-rendered">{{.Body}}</div>
{{- end}}
{{end}}
