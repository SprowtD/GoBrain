{{define "search"}}
{{- if not .Query -}}
{{- else if not .Hits -}}
<p class="empty">No matches for “{{.Query}}”.</p>
{{- else -}}
<ul class="hits">
  {{- range .Hits }}
  <li class="hit">
    <button class="hit-title link" {{if .Score}}title="relevance {{printf "%.2f" .Score}}" {{end}}hx-get="/ui/note?path={{.Path | urlquery}}" hx-target="#note-panel" hx-swap="innerHTML">{{.Title}}</button>
    {{- if .Snippet}}<div class="hit-snippet">{{.Snippet}}</div>{{end}}
    {{- if .Path}}<div class="hit-path">{{.Path}}</div>{{end}}
  </li>
  {{- end }}
</ul>
{{- end -}}
{{end}}
